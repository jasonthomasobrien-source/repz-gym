        - generic [ref=e25]: OUR STORY
        - heading "THE REPZ GYM STORY" [level=2] [ref=e26]
      - generic [ref=e28]:
        - paragraph [ref=e30]: "When we opened Repz Gym in 1998, we made a choice: no frills. No shiny chrome machines that nobody uses. No dance music. No \"fitness motivation\" posters. Just a solid floor, serious equipment, and the kind of people who show up to do the work."
        - paragraph [ref=e32]: Nearly three decades later, that choice is still the same. We're in Plainwell because we're a Plainwell gym. We're here for the people who live here — the ones who want a real workout, not a status symbol. We've got everything you need to build strength, from the full free-weight floor to the best machines money can buy.
        - paragraph [ref=e34]: Our community is our gym. We've trained families, high school athletes, weekend warriors, and lifers. We've seen members hit their first bodyweight pullup, deadlift two plates for the first time, and find the confidence that comes with knowing you're stronger than you were yesterday.
        - paragraph [ref=e36]: That's Repz. That's us. That's why we're still here.
