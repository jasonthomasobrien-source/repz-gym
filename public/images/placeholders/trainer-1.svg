<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trainerBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="240" fill="url(#trainerBg1)"/>
  <!-- Silhouette -->
  <g transform="translate(100, 60)">
    <!-- Head -->
    <circle cx="0" cy="-35" r="20" fill="#FF6B35" opacity="0.9"/>
    <!-- Shoulders/Chest -->
    <ellipse cx="0" cy="-10" rx="28" ry="20" fill="#FF6B35" opacity="0.9"/>
    <!-- Arms -->
    <rect x="-32" y="0" width="12" height="40" fill="#FF6B35" opacity="0.8" rx="6"/>
    <rect x="20" y="0" width="12" height="40" fill="#FF6B35" opacity="0.8" rx="6"/>
    <!-- Torso -->
    <rect x="-16" y="15" width="32" height="35" fill="#FF6B35" opacity="0.9" rx="4"/>
    <!-- Legs -->
    <rect x="-10" y="50" width="10" height="40" fill="#FF6B35" opacity="0.85" rx="5"/>
    <rect x="0" y="50" width="10" height="40" fill="#FF6B35" opacity="0.85" rx="5"/>
  </g>
  <!-- Badge -->
  <circle cx="170" cy="30" r="18" fill="#00BCD4"/>
  <text x="170" y="37" font-size="24" font-weight="bold" fill="#0a0a0a" text-anchor="middle">⚡</text>
</svg>
