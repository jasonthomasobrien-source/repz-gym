<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="classBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141414;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#classBg2)"/>
  <!-- Martial arts stance figure -->
  <g transform="translate(200, 100)">
    <!-- Head -->
    <circle cx="0" cy="-40" r="12" fill="#00BCD4"/>
    <!-- Body -->
    <rect x="-8" y="-25" width="16" height="30" fill="#FF6B35" rx="2"/>
    <!-- Left arm (punch) -->
    <rect x="-30" y="-20" width="22" height="8" fill="#FF6B35" rx="4"/>
    <!-- Right arm -->
    <rect x="8" y="-15" width="18" height="8" fill="#00BCD4" rx="4"/>
    <!-- Left leg (kick) -->
    <rect x="-25" y="5" width="10" height="30" fill="#FF6B35" rx="3" transform="rotate(-30 -20 20)"/>
    <!-- Right leg -->
    <rect x="15" y="10" width="10" height="25" fill="#00BCD4" rx="3"/>
  </g>
  <!-- Text -->
  <text x="200" y="250" font-size="24" font-weight="bold" fill="#00BCD4" text-anchor="middle" font-family="Oswald">
    MARTIAL ARTS
  </text>
</svg>
