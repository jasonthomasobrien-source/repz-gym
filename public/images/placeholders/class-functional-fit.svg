<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="functionalBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141414;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#functionalBg)"/>
  <!-- Kettlebell -->
  <g transform="translate(200, 120)">
    <ellipse cx="0" cy="-40" rx="35" ry="40" fill="#FF6B35" opacity="0.9"/>
    <rect x="-8" y="0" width="16" height="50" fill="#FF6B35" rx="4"/>
    <ellipse cx="0" cy="50" rx="20" ry="12" fill="#00BCD4" opacity="0.8"/>
  </g>
  <!-- Motion lines -->
  <line x1="80" y1="100" x2="120" y2="80" stroke="#00BCD4" stroke-width="3" opacity="0.6"/>
  <line x1="320" y1="140" x2="280" y2="160" stroke="#FF6B35" stroke-width="3" opacity="0.6"/>
  <!-- Text -->
  <text x="200" y="260" font-size="24" font-weight="bold" fill="#00BCD4" text-anchor="middle" font-family="Oswald">
    MOVEMENT & STRENGTH
  </text>
</svg>
